<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo Peso</title>

    <link rel="icon" type="image/png" href="img/pesagem.webp">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <img src="img/pesagem.webp" alt="imagem de uma balança">

    <h1>Programa Cálculo do Peso Ideal</h1>

    <form> 
        <p> Nome: 
            <input type="text" id="inNome" required>
        </p>
        <p> Sexo
            <input type="radio" name="sexo" id="inMasculino" required> Masculino
            <input type="radio" name="sexo" id="inFeminino" required> Feminino
        </p>
        <p> Altura: 
            <input type="number" min="0" max="100" step="0.01" id="inAltura" required>
        </p>
        <input type="submit" value="Calcular Peso Ideial">
        <input type="reset" value="Limpar Campos">

        <h2></h2>

        <script src="js/ex4_2.js" ></script>
    </form>
</body>
</html>
