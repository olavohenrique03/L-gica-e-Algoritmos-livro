<script>
    const precoProduto = Number(prompt("Qual o preço do produto?"));
    const opVista = precoProduto - (precoProduto * 0.10);
    const op3x = precoProduto / 3;
    alert(`O preço ${precoProduto.toFixed(2)} a vista fica ${opVista.toFixed(2)} com 10% de desconto, e parcelado em 3x fica ${op3x.toFixed(2)}`);
</script>
