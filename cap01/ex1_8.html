Entrada de dados: Quantidade de dias da viagem (dias e horas)
Processamento de dados: Calcular o total da viagem em numero de horas
Saida de dados: Mostrar o resultado em horas

<script>
    const dias = Number(prompt("Quantos dias de viagem?: "));
    const horas = Number(prompt("Quantas horas?: "));
    const resultado = (dias * 24) + horas;
    alert(`O resultado de ${dias} dias e ${horas} horas, vai dar ${resultado} em horas!`);
</script>
